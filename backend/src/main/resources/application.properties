# ===============================
# SERVER CONFIGURATION
# ===============================

server.address=0.0.0.0
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MongoDB)
# ===============================
spring.data.mongodb.uri=mongodb://localhost:27017/bugsecure_db
spring.data.mongodb.database=bugsecure_db
# Auto-reconnect configuration
spring.data.mongodb.auto-index-creation=true
# Connection pool settings for persistence
spring.data.mongodb.options.connections-per-host=10
spring.data.mongodb.options.min-connections-per-host=5
spring.data.mongodb.options.max-wait-time=120000
spring.data.mongodb.options.connect-timeout=10000
spring.data.mongodb.options.socket-timeout=0
spring.data.mongodb.options.heartbeat-frequency=10000
spring.data.mongodb.options.heartbeat-connect-timeout=20000
spring.data.mongodb.options.heartbeat-socket-timeout=20000

jwt.secret=mysupersecretkey-must-be-very-long-and-random-12345

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB



