# ===============================
# SERVER CONFIGURATION
# ===============================

server.address=0.0.0.0
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MongoDB)
# ===============================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
# Auto-reconnect configuration
spring.data.mongodb.auto-index-creation=true
# Connection pool settings for persistence
spring.data.mongodb.options.connections-per-host=10
spring.data.mongodb.options.min-connections-per-host=5
spring.data.mongodb.options.max-wait-time=120000
spring.data.mongodb.options.connect-timeout=10000
spring.data.mongodb.options.socket-timeout=0
spring.data.mongodb.options.heartbeat-frequency=10000
spring.data.mongodb.options.heartbeat-connect-timeout=20000
spring.data.mongodb.options.heartbeat-socket-timeout=20000

jwt.secret=${JWT_SECRET}

# ===============================
# FX (currency conversion) config
# ===============================
# Uses a fallback USD->INR rate if fx.provider.api-key is not set.
fx.provider.api-key=
fx.provider.base-url=https://v6.exchangerate-api.com/v6
fx.cache.ttl-seconds=1800

# ===============================
# Platform wallet commission recipient
# ===============================
platform.admin.email=bugsecure12admin@gmail.com

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Legacy storage root for older persisted records.
file.storage.legacy-root=./uploads

# ===============================
# Hosted sandbox execution config
# ===============================
# If sandbox.base-url is empty, the app falls back to the existing simulator.
sandbox.base-url=
sandbox.api-key=
sandbox.run-path=/api/sandbox/run
sandbox.poll-path=/api/sandbox/executions/{executionId}
sandbox.poll-interval-ms=3000
sandbox.max-wait-seconds=180
sandbox.fallback-to-simulator=true


# ===============================
# Docker-based sandbox config
# ===============================
# If you use the in-app static server sandbox (for now), this controls which image is used.
sandbox.docker.image=bugsecure/sandbox-runner:latest

# The sandbox app listens on this port inside the container.
sandbox.docker.container-port=8080

# Published host port will be chosen dynamically; this sets CPU/memory limits.
sandbox.docker.cpus=0.5
sandbox.docker.memory=256m
sandbox.docker.pids-limit=64

# Security: container is run without extra Linux capabilities.
sandbox.docker.cap-drop=ALL
sandbox.docker.no-new-privileges=true

# Network: keep default as `bridge` so host port publishing works.
# For stricter egress control, adjust this or deploy with a dedicated internal network.
sandbox.docker.network-mode=bridge

# Sandbox TTL (auto stop + cleanup)
sandbox.session.ttl-seconds=300
sandbox.cleanup.interval-ms=60000
sandbox.max-sessions-per-user=3

# Working directory for packaging sandbox files (host-side).
# This is NOT mounted into the container; contents are copied via `docker cp`.
sandbox.work-dir=./sandbox_workdir



